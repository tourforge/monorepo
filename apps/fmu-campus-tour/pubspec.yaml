name: fmu_campus_tour
description: The FMU Campus Tour tour guide app.
version: 1.0.1+3
publish_to: 'none'

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  tourforge_baseline: any
  path_provider: ^2.0.13
  path: ^1.8.2
  url_launcher: ^6.1.12
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_oss_licenses: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "assets/icon/icon-background.png"
  adaptive_icon_foreground: "assets/icon/icon-foreground.png"
  min_sdk_android: 24
